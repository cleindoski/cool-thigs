<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>🎂 Ulang Tahun Ayah 🎉</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Comic Sans MS", cursive, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
      }
      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      html {
        scroll-behavior: smooth;
      }
      section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }
      h1 {
        text-align: center;
        font-size: 48px;
        color: #fff;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        margin-bottom: 30px;
        animation: bounceText 2s infinite;
      }
      @keyframes bounceText {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      h2 {
        color: #fff;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }
      .ucapan,
      .tambahan {
        max-width: 600px;
        margin: 0 auto 30px auto;
        background: rgba(255, 255, 255, 0.85);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        text-align: center;
        font-size: 20px;
        color: #333;
        animation: fadeIn 2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .galeri {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        max-width: 900px;
        margin: 0 auto;
      }
      .galeri img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .galeri img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .btn-mulai {
        padding: 20px 50px;
        font-size: 28px;
        font-weight: bold;
        color: #fff;
        background: linear-gradient(45deg, #ff6ec4, #7873f5);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .btn-mulai:hover {
        transform: scale(1.1);
        box-shadow: 0 0 40px rgba(255, 255, 255, 1);
      }
      .music-control {
        text-align: center;
        margin-top: 30px;
      }
      .music-control button {
        padding: 10px 25px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ff6ec4, #7873f5);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        transition: transform 0.3s ease;
      }
      .music-control button:hover {
        transform: scale(1.1);
      }
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: fall linear forwards;
      }
      @keyframes fall {
        to {
          transform: translateY(100vh) rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Halaman Awal -->
    <section class="awal">
      <h2>🎂 Selamat Datang 🎉</h2>
      <h1>Hari spesial untuk Ayah</h1>
      <a href="#halaman-utama">
        <button class="btn-mulai" onclick="startConfetti()">Mulai 🎉</button>
      </a>
    </section>

    <!-- Halaman Utama -->
    <section id="halaman-utama" class="utama">
      <h1>🎂 Selamat Ulang Tahun Ayah 🎉</h1>

      <div class="ucapan">
        <p>
          Selamat ulang tahun ayah, semoga selalu sehat, panjang umur, dan
          rezekinya lancar. Ini ucapan dari Maher untuk ayah tercinta.
        </p>
      </div>

      <div class="tambahan">
        <p>
          Maher bikin website ini khusus untuk ayah, dan sudah menambahkan album
          keluarga di bawah ini.
        </p>
      </div>

      <div class="galeri">
        <img src="foto keluarga.jpeg" alt="album 1" />
        <img src="foto keluarga 2.jpeg" alt="album 2" />
        <img src="foto keluarga 3.jpeg" alt="album 3" />
        <img src="foto keluarga 4.jpeg" alt="album 4" />
      </div>

      <div class="music-control">
        <button
         onclick="
            toggleMusic();
            startConfetti();
          "
        >
          🎵 Putar / Pause Musik
        </button>
      </div>

    <img src="https://drive.google.com/uc?export=view&id=1N9sQPSMApmtp5gwWfq1XiIxYLQyHPwtw" />

<audio id="bg-music" preload="auto" loop>
  <source src="musik.mp3" type="audio/mpeg" />
  Browser Anda tidak mendukung audio.
</audio>


    <script>
      const music = document.getElementById("bg-music");
      function toggleMusic() {
        if (music.paused) {
          music.play();
        } else {
          music.pause();
        }
      }
      // Auto play musik setelah klik pertama (untuk HP)
      document.body.addEventListener(
        "click",
        () => {
          if (music.paused) {
            music.play();
          }
        },
        { once: true },
      );

      // Confetti generator
      function startConfetti() {
        for (let i = 0; i < 40; i++) {
          const confetti = document.createElement("div");
          confetti.classList.add("confetti");
          confetti.style.left = Math.random() * window.innerWidth + "px";
          confetti.style.backgroundColor = [
            "#ff6ec4",
            "#7873f5",
            "#fbc2eb",
            "#a6c1ee",
            "#ff9a9e",
          ][Math.floor(Math.random() * 5)];
          confetti.style.animationDuration = Math.random() * 3 + 2 + "s";
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }
    </script>
  </body>
</html>
